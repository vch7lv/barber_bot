services:
  barber_bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_DSN=file:/app/data/barber_bot.db?_journal_mode=WAL
      - BACKUP_DIR=/app/backups
    volumes:
      - barber_data:/app/data
      - barber_backups:/app/backups

volumes:
  barber_data:
  barber_backups:
